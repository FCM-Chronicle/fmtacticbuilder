<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FM26 전술 빌더</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --p0:#07021a;--p1:#0f0728;--p2:#180e3d;--p3:#251660;--p4:#3a2280;
  --p5:#5535a8;--p6:#7a52d0;--p7:#a87fe8;--p8:#d4b8ff;
  --acc:#f5c842;--acc2:#00e8b8;--red:#f04060;--grn:#22d47a;
  --border:rgba(90,50,160,.45);--border2:rgba(120,80,200,.6);
  --glass:rgba(37,22,96,.55);--r:8px;--r2:5px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--p0);color:#e0d0ff;font-family:'Noto Sans KR',sans-serif;font-size:13px;display:flex;flex-direction:column;}

nav{height:48px;background:rgba(7,2,26,.97);border-bottom:1.5px solid var(--border2);display:flex;align-items:center;padding:0 8px;flex-shrink:0;z-index:200;}
.logo{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--acc);letter-spacing:3px;text-shadow:0 0 24px rgba(245,200,66,.45);margin-right:10px;flex-shrink:0;}
.logo em{color:var(--p7);font-style:normal;}
.nav-tabs{display:flex;flex:1;overflow-x:auto;scrollbar-width:none;}
.nav-tabs::-webkit-scrollbar{display:none;}
.ntab{padding:0 13px;height:48px;border:none;background:transparent;color:var(--p7);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;border-bottom:2.5px solid transparent;transition:all .15s;}
.ntab:hover{color:#e0d0ff;}
.ntab.on{color:var(--acc);border-bottom-color:var(--acc);}
.nav-right{display:flex;gap:6px;flex-shrink:0;margin-left:8px;}
.ibtn{height:32px;padding:0 12px;border-radius:var(--r2);border:1.5px solid var(--border2);background:var(--glass);color:#e0d0ff;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;transition:all .15s;display:flex;align-items:center;gap:5px;}
.ibtn:hover{border-color:var(--p6);color:var(--acc);}
.ibtn.acc{background:var(--acc);color:#07021a;border-color:var(--acc);font-weight:700;}
.ibtn.acc:hover{background:#ffd840;}

.screen{display:none;flex:1;overflow:hidden;flex-direction:column;}
.screen.on{display:flex;}

/* ── FORMATION ── */
#s-formation{flex-direction:column;}

.fm-phase-tabs{display:flex;height:40px;background:var(--p1);border-bottom:1.5px solid var(--border);flex-shrink:0;}
.fptab{flex:1;border:none;background:transparent;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;cursor:pointer;border-bottom:2.5px solid transparent;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;}
.fptab.ip-tab{color:var(--acc2);}
.fptab.ip-tab:hover{color:#e0d0ff;}
.fptab.ip-tab.on{color:var(--acc2);border-bottom-color:var(--acc2);background:rgba(0,232,184,.06);}
.fptab.oop-tab{color:var(--red);}
.fptab.oop-tab:hover{color:#e0d0ff;}
.fptab.oop-tab.on{color:var(--red);border-bottom-color:var(--red);background:rgba(240,64,96,.06);}

.mode-toggle{display:flex;padding:8px 12px;background:var(--p1);gap:8px;border-bottom:1px solid var(--border);flex-shrink:0;}
.mode-btn{flex:1;padding:8px;border-radius:var(--r2);border:1.5px solid var(--border);background:var(--p2);color:var(--p7);font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:13px;transition:all .15s;}
.mode-btn.on{background:var(--acc);color:#000;border-color:var(--acc);}

.fm-phase{display:none;flex:1;overflow:hidden;flex-direction:row;}
.fm-phase.on{display:flex;}

.pitch-area{flex:1;display:flex;align-items:center;justify-content:center;padding:12px;overflow:hidden;background:var(--p0);position:relative;}
.pitch-wrap{position:relative;width:min(320px,calc(100vw - 32px));aspect-ratio:68/105;}
.pitch-svg{position:absolute;inset:0;width:100%;height:100%;}

#slotsLayerIP,#tokensLayerIP,#slotsLayerOOP,#tokensLayerOOP{position:absolute;inset:0;pointer-events:none;}
#slotsLayerIP,#slotsLayerOOP{pointer-events:all;}

.slot{position:absolute;transform:translate(-50%,-50%);width:46px;height:46px;border-radius:50%;border:2px dashed rgba(90,53,168,.3);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;z-index:1;}
.slot:hover{border-color:rgba(168,127,232,.55);background:rgba(90,53,168,.18);}
.slot.has-player{border-color:transparent;background:transparent;}
.slot.drag-over{border-color:var(--acc2)!important;background:rgba(0,232,184,.22)!important;border-style:solid!important;border-width:2.5px!important;}

.token{position:absolute;transform:translate(-50%,-50%);z-index:10;display:flex;flex-direction:column;align-items:center;gap:2px;touch-action:none;user-select:none;pointer-events:all;}
.token-circle{width:40px;height:40px;border-radius:50%;background:var(--p4);border:2.5px solid var(--p6);display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;color:#e0d0ff;line-height:1.1;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.6);transition:border-color .15s,box-shadow .15s,transform .1s;user-select:none;cursor:pointer;}
.token.gk .token-circle{background:#7c3a06;border-color:#f5a623;}
.token:hover .token-circle{border-color:var(--acc);transform:scale(1.08);}
.token.selected .token-circle{border-color:var(--acc);box-shadow:0 0 0 3px rgba(245,200,66,.3),0 2px 16px rgba(0,0,0,.7);}
.token.dragging .token-circle{opacity:.5;cursor:grabbing;}
.pos-abbr{font-size:10px;font-weight:800;pointer-events:none;}
.role-badge{font-size:7px;opacity:.8;pointer-events:none;}
.ip-color{color:var(--acc2);}
.oop-color{color:var(--red);}
.token-name{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;color:#fff;text-shadow:0 1px 4px #000,0 0 8px rgba(0,0,0,.9);white-space:nowrap;pointer-events:none;max-width:70px;overflow:hidden;text-overflow:ellipsis;}
.token-role{font-family:'Barlow Condensed',sans-serif;font-size:8px;color:var(--p8);text-shadow:0 1px 3px #000;white-space:nowrap;pointer-events:none;max-width:70px;overflow:hidden;text-overflow:ellipsis;}

.ped{position:absolute;bottom:0;left:0;right:0;background:rgba(8,3,22,.98);border-top:1.5px solid var(--border2);padding:12px 14px 14px;transform:translateY(100%);transition:transform .22s ease;z-index:50;max-height:80%;overflow-y:auto;}
.ped.open{transform:translateY(0);}
.ped-close{position:absolute;top:10px;right:12px;background:transparent;border:none;color:var(--p7);font-size:18px;cursor:pointer;padding:4px;z-index:51;}
.ped-close:hover{color:var(--acc);}
.ped-field{display:flex;flex-direction:column;gap:3px;min-width:130px;flex:1;}
.ped-label{font-size:10px;font-weight:700;color:var(--p7);text-transform:uppercase;letter-spacing:1px;}
.ped-select,.ped-input{padding:6px 10px;background:var(--p1);border:1.5px solid var(--border);border-radius:var(--r2);color:#e0d0ff;font-size:12px;font-family:'Noto Sans KR',sans-serif;outline:none;width:100%;}
.ped-select:focus,.ped-input:focus{border-color:var(--p6);}
.pi-sec{margin-top:8px;}
.pi-sec-label{font-size:10px;font-weight:700;color:var(--p7);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.pi-chips{display:flex;flex-wrap:wrap;gap:3px;}
.pichip{padding:3px 8px;border-radius:10px;border:1.5px solid var(--border);background:transparent;color:var(--p7);font-size:11px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .12s;}
.pichip:hover{border-color:var(--p6);color:#e0d0ff;}
.pichip.on{background:var(--p3);border-color:var(--p6);color:#e0d0ff;}
.pichip.forced{background:rgba(245,200,66,.12);border-color:var(--acc);color:var(--acc);cursor:default;}
.pichip.locked{opacity:.25;cursor:not-allowed;text-decoration:line-through;}

/* ── SETUP TAB ── */
#s-setup{flex-direction:column;overflow-y:auto;}
.setup-content{padding:16px;max-width:900px;margin:0 auto;width:100%;}
.setup-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:600px){.setup-grid{grid-template-columns:1fr;}}
.card{background:var(--p1);border:1.5px solid var(--border);border-radius:var(--r);padding:13px;}
.card-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--p8);letter-spacing:.5px;margin-bottom:9px;display:flex;align-items:center;gap:5px;}
.tname-inp{width:100%;padding:7px 10px;background:var(--p0);border:1.5px solid var(--border);border-radius:var(--r2);color:#e0d0ff;font-size:12px;font-family:'Noto Sans KR',sans-serif;outline:none;}
.tname-inp:focus{border-color:var(--p6);}
.preset-grid-setup{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
.pbtn{padding:6px 4px;border-radius:var(--r2);border:1.5px solid var(--border);background:transparent;color:var(--p7);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;cursor:pointer;text-align:center;transition:all .14s;}
.pbtn:hover{border-color:var(--p6);color:#e0d0ff;}
.pbtn.on{background:var(--p3);border-color:var(--acc);color:var(--acc);}
.mrow{display:flex;flex-wrap:wrap;gap:5px;}
.mchip{padding:6px 12px;border-radius:12px;border:1.5px solid var(--border);background:transparent;color:var(--p7);font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .13s;}
.mchip:hover{border-color:var(--p6);color:#e0d0ff;}
.mchip.on{background:var(--p3);border-color:var(--p6);color:#e0d0ff;}
.sec-header{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1.5px;color:var(--p7);text-transform:uppercase;padding:8px 0 6px;border-bottom:1px solid var(--border);margin-bottom:10px;}
.phase-label{display:flex;align-items:center;gap:6px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;margin-bottom:8px;}
.phase-label.ip{color:var(--acc2);}
.phase-label.oop{color:var(--red);}

/* ── BASE FORMATION TAB ── */
#s-base{flex-direction:column;overflow-y:auto;}
.base-content{padding:16px;max-width:700px;margin:0 auto;width:100%;}
.base-notice{background:rgba(245,200,66,.08);border:1.5px solid rgba(245,200,66,.3);border-radius:var(--r);padding:12px 14px;font-size:12px;color:var(--acc);line-height:1.7;margin-bottom:16px;}
.base-notice strong{font-weight:700;}
.base-synced{background:rgba(0,232,184,.08);border:1.5px solid rgba(0,232,184,.3);border-radius:var(--r);padding:12px 14px;font-size:12px;color:var(--acc2);line-height:1.7;margin-bottom:16px;}
.base-preset-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
@media(max-width:480px){.base-preset-grid{grid-template-columns:repeat(2,1fr);}}
.base-pbtn{padding:14px 8px;border-radius:var(--r);border:1.5px solid var(--border);background:var(--p1);color:var(--p7);font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;cursor:pointer;text-align:center;transition:all .14px;line-height:1.3;}
.base-pbtn:hover{border-color:var(--p6);color:#e0d0ff;background:var(--p2);}
.base-pbtn.on{background:var(--p3);border-color:var(--acc);color:var(--acc);}
.base-pbtn small{display:block;font-size:10px;font-weight:400;opacity:.7;margin-top:2px;font-family:'Noto Sans KR',sans-serif;}
.sync-btn{width:100%;padding:14px;border-radius:var(--r);border:2px solid var(--acc);background:rgba(245,200,66,.1);color:var(--acc);font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;cursor:pointer;letter-spacing:1px;transition:all .15s;margin-top:4px;}
.sync-btn:hover{background:var(--acc);color:#07021a;}
.sync-btn:disabled{opacity:.35;cursor:not-allowed;background:transparent;}

/* ── SAVES ── */
#s-saves{overflow-y:auto;}
.saves-wrap{padding:14px;max-width:900px;margin:0 auto;width:100%;}
.saves-card{background:var(--p1);border:1.5px solid var(--border);border-radius:var(--r);padding:16px;}
.saves-card h2{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;color:var(--p8);margin-bottom:12px;}
.save-item{background:var(--p2);border:1.5px solid var(--border);border-radius:var(--r);padding:11px 13px;margin-bottom:7px;display:flex;align-items:center;gap:9px;}
.si-info{flex:1;}
.si-name{font-weight:600;font-size:14px;}
.si-meta{font-size:11px;color:var(--p7);margin-top:1px;}
.empty-msg{text-align:center;color:var(--p7);padding:40px;font-size:13px;}

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--grn);color:#07021a;padding:10px 22px;border-radius:24px;font-size:13px;font-weight:700;z-index:9999;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 24px rgba(0,0,0,.5);font-family:'Noto Sans KR',sans-serif;}
#toast.show{opacity:1;}

@media(max-width:480px){.fm-phase{flex-direction:column;}.pitch-wrap{width:min(280px,90vw);}}
@media(max-width:420px){.ntab{font-size:12px;padding:0 9px;}}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--p0);}
::-webkit-scrollbar-thumb{background:var(--p3);border-radius:3px;}
</style>
</head>
<body>

<nav>
  <div class="logo">FM<em>26</em></div>
  <div class="nav-tabs">
    <button class="ntab on"  onclick="goScreen('setup',this)">⚙️ 설정</button>
    <button class="ntab"     onclick="goScreen('base',this)">📐 기본 포메이션</button>
    <button class="ntab"     onclick="goScreen('formation',this)">⚽ 포메이션</button>
    <button class="ntab"     onclick="goScreen('instructions',this)">🎯 팀 지침</button>
    <button class="ntab"     onclick="goScreen('saves',this)">💾 저장함</button>
  </div>
  <div class="nav-right">
    <button class="ibtn" onclick="doExportJSON()">⬇ JSON</button>
    <button class="ibtn acc" onclick="doSave()">💾 저장</button>
  </div>
</nav>

<!-- ── SETUP ── -->
<div id="s-setup" class="screen on">
  <div class="setup-content">
    <div class="sec-header">⚙️ 전술 기본 설정</div>
    <div class="card" style="margin-bottom:14px;">
      <div class="card-title">📝 전술 이름</div>
      <input class="tname-inp" id="tacticName" value="나의 전술" placeholder="전술 이름">
    </div>
    <div class="card" style="margin-bottom:14px;">
      <div class="card-title">🧠 멘탈리티</div>
      <div class="mrow" id="mentalityRow"></div>
    </div>
    <div class="setup-grid">
      <div class="card">
        <div class="card-title"><span class="phase-label ip">⚽ 공 소유 시 포메이션</span></div>
        <div class="preset-grid-setup" id="presetGridIP"></div>
      </div>
      <div class="card">
        <div class="card-title"><span class="phase-label oop">🛡 공 미소유 시 포메이션</span></div>
        <div class="preset-grid-setup" id="presetGridOOP"></div>
      </div>
    </div>
  </div>
</div>

<!-- ── BASE FORMATION ── -->
<div id="s-base" class="screen">
  <div class="base-content">
    <div class="sec-header">📐 기본 포메이션</div>
    <div class="base-notice">
      <strong>⚡ 동기화 안내:</strong> 포메이션을 선택하고 동기화를 누르면 해당 phase에 적용됩니다.<br>
      선수 이름은 <strong>슬롯 번호 기준</strong>으로 IP/OOP가 항상 공유됩니다.
    </div>
    <div class="card" style="margin-bottom:16px;">
      <div class="card-title">📋 포메이션 선택</div>
      <div class="base-preset-grid" id="basePresetGrid"></div>
    </div>
    <div class="card">
      <div class="card-title">🔄 동기화 옵션</div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        <button class="sync-btn" onclick="syncBoth()">⚽🛡 IP + OOP 모두 동기화</button>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
          <button class="sync-btn" style="font-size:14px;padding:10px;" onclick="syncOne('ip')">⚽ IP만 적용</button>
          <button class="sync-btn" style="font-size:14px;padding:10px;" onclick="syncOne('oop')">🛡 OOP만 적용</button>
        </div>
      </div>
      <div id="syncResult" style="margin-top:10px;"></div>
    </div>
  </div>
</div>

<!-- ── FORMATION ── -->
<div id="s-formation" class="screen">
  <div class="fm-phase-tabs">
    <button class="fptab ip-tab on" id="fptab-ip" onclick="switchPhase('ip')">⚽ 공 소유 시</button>
    <button class="fptab oop-tab"   id="fptab-oop" onclick="switchPhase('oop')">🛡 공 미소유 시</button>
  </div>
  <div class="mode-toggle">
    <button class="mode-btn on" id="modeEditBtn" onclick="setInteractionMode('edit',this)">👆 역할 설정</button>
    <button class="mode-btn"    id="modeDragBtn" onclick="setInteractionMode('drag',this)">✋ 이동 드래그</button>
  </div>

  <div class="fm-phase on" id="phase-ip">
    <div class="pitch-area" id="pitchAreaIP">
      <div class="pitch-wrap" id="pitchWrapIP">
        <svg class="pitch-svg" viewBox="0 0 320 496" preserveAspectRatio="none">
          <defs><linearGradient id="grass" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1c5c1c"/><stop offset="100%" stop-color="#1a501a"/></linearGradient></defs>
          <rect width="320" height="496" rx="6" fill="url(#grass)"/>
          <rect x="0" y="0"   width="320" height="46" fill="rgba(0,0,0,.06)"/>
          <rect x="0" y="92"  width="320" height="46" fill="rgba(0,0,0,.06)"/>
          <rect x="0" y="184" width="320" height="46" fill="rgba(0,0,0,.06)"/>
          <rect x="0" y="276" width="320" height="46" fill="rgba(0,0,0,.06)"/>
          <rect x="0" y="368" width="320" height="46" fill="rgba(0,0,0,.06)"/>
          <rect x="0" y="460" width="320" height="46" fill="rgba(0,0,0,.06)"/>
          <rect x="12" y="12" width="296" height="472" stroke="rgba(255,255,255,.22)" stroke-width="1.5" fill="none" rx="2"/>
          <line x1="12" y1="248" x2="308" y2="248" stroke="rgba(255,255,255,.22)" stroke-width="1.5"/>
          <circle cx="160" cy="248" r="40" stroke="rgba(255,255,255,.2)" stroke-width="1.5" fill="none"/>
          <circle cx="160" cy="248" r="3" fill="rgba(255,255,255,.28)"/>
          <rect x="84"  y="12"  width="152" height="76" stroke="rgba(255,255,255,.18)" stroke-width="1" fill="none"/>
          <rect x="118" y="12"  width="84"  height="28" stroke="rgba(255,255,255,.18)" stroke-width="1" fill="none"/>
          <rect x="84"  y="408" width="152" height="76" stroke="rgba(255,255,255,.18)" stroke-width="1" fill="none"/>
          <rect x="118" y="456" width="84"  height="28" stroke="rgba(255,255,255,.18)" stroke-width="1" fill="none"/>
        </svg>
        <div id="slotsLayerIP"></div>
        <div id="tokensLayerIP"></div>
      </div>
      <div class="ped" id="playerEditorIP">
        <button class="ped-close" id="pedCloseIP">✕</button>
        <div id="pedContentIP"></div>
      </div>
    </div>
  </div>

  <div class="fm-phase" id="phase-oop">
    <div class="pitch-area" id="pitchAreaOOP">
      <div class="pitch-wrap" id="pitchWrapOOP">
        <svg class="pitch-svg" viewBox="0 0 320 496" preserveAspectRatio="none">
          <defs><linearGradient id="grass2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a1a3c"/><stop offset="100%" stop-color="#16163a"/></linearGradient></defs>
          <rect width="320" height="496" rx="6" fill="url(#grass2)"/>
          <rect x="0" y="0"   width="320" height="46" fill="rgba(0,0,0,.08)"/>
          <rect x="0" y="92"  width="320" height="46" fill="rgba(0,0,0,.08)"/>
          <rect x="0" y="184" width="320" height="46" fill="rgba(0,0,0,.08)"/>
          <rect x="0" y="276" width="320" height="46" fill="rgba(0,0,0,.08)"/>

/* ═══════════════════════════════════════════════════

     { name, ipRole, oopRole, ipPi, oopPi }

   ip.slots / oop.slots: 길이 11 배열
     slots[i] = slotId (i번 선수가 위치할 슬롯)
     → "슬롯 i번" = players[i], 항상 1:1 대응

   드래그 = slots 배열 안에서 두 인덱스의 slotId 교환
   이름 수정 = players[i].name 수정, IP·OOP 즉시 공유
═══════════════════════════════════════════════════ */
let state = {
  players: [],   // 11명, 인덱스 고정
  ip:  { formation:'4-3-3', slots:[] }, // slots[i] = slotId
  oop: { formation:'4-3-3', slots:[] },
  mentality: '균형',
};

// 포메이션 이름 → slotId 배열 11개 (GK 포함, GK 마지막→맨 앞)
function presetSlots(name) {
  const pre = PRESETS[name];
  const order = ['GK'];
  ['DF','DM','M','AM','ST'].forEach(row => (pre[row]||[]).forEach(id => order.push(id)));
  return order; // 항상 길이 11
}

// 최초 초기화: players 11명 생성, ip/oop slots 세팅
function initState(formation) {
  const slots = presetSlots(formation);
  state.players = slots.map(slotId => {
    const roles = STANDARD_ROLES[slotId] || ['기본'];
    return {
      name:    DEF_NAMES[slotId] || slotId,
      ipRole:  roles[0],
      oopRole: roles[0],
      ipPi:    {},
      oopPi:   {},
    };
  });
  state.ip  = { formation, slots: [...slots] };
  state.oop = { formation, slots: [...slots] };
}

/* ═══════════════════════════════════════════════════
   포메이션 변경
   ─────────────────────────────────────────────────
   핵심 규칙: players 배열은 절대 건드리지 않는다.
   오직 phase.slots 배열만 교체.

   새 포메이션의 슬롯 수가 다르면 나머지 선수는
   기존 슬롯(없어진 자리)에 그대로 두되,
   슬롯 ID만 새 것으로 덮어쓴다.
   → 단순히: 새 slots 배열을 그대로 쓴다.
     선수는 인덱스 그대로, 슬롯 ID만 업데이트.
═══════════════════════════════════════════════════ */
function changeFormation(name, phase) {
  const newSlots = presetSlots(name);
  // 그냥 새 슬롯 배열로 교체. players는 안 건드림.
  state[phase].formation = name;
  state[phase].slots = [...newSlots];
  selIdx[phase] = null;
  closeEditor(phase);
  renderPitch(phase);
}

function buildSetupPresets() {
  ['ip','oop'].forEach(phase => {
    const g = document.getElementById('presetGrid' + (phase==='ip'?'IP':'OOP'));
    g.innerHTML = '';
    Object.keys(PRESETS).forEach(f => {
      const b = document.createElement('button');
      b.className = 'pbtn' + (f === state[phase].formation ? ' on' : '');
      b.textContent = f;
      b.addEventListener('click', () => {
        changeFormation(f, phase);
        g.querySelectorAll('.pbtn').forEach(x => x.classList.toggle('on', x.textContent === f));
      });
      g.appendChild(b);
    });
  });
}

let baseFormationName = '4-3-3';

function buildBasePresets() {
  const g = document.getElementById('basePresetGrid');
  g.innerHTML = '';
  Object.keys(PRESETS).forEach(f => {
    const b = document.createElement('button');
    b.className = 'base-pbtn' + (f === baseFormationName ? ' on' : '');
    b.innerHTML = f + '<small>' + getFormationDesc(f) + '</small>';
    b.dataset.f = f;
    b.addEventListener('click', () => {
      baseFormationName = f;
      g.querySelectorAll('.base-pbtn').forEach(x => x.classList.toggle('on', x.dataset.f === f));
    });
    g.appendChild(b);
  });
}

function getFormationDesc(f) {
  const pre = PRESETS[f];
  const total = ['DF','DM','M','AM','ST'].reduce((s,r) => s+(pre[r]||[]).length, 0);
  return `필드 ${total}명`;
}

function syncBoth() {
  changeFormation(baseFormationName, 'ip');
  changeFormation(baseFormationName, 'oop');
  refreshSetupButtons('ip'); refreshSetupButtons('oop');
  document.getElementById('syncResult').innerHTML =
    `<div class="base-synced">✅ IP + OOP 모두 <strong>${baseFormationName}</strong>으로 동기화!</div>`;
  showToast(`${baseFormationName} 양쪽 모두 적용! ✅`);
}

function syncOne(phase) {
  changeFormation(baseFormationName, phase);
  refreshSetupButtons(phase);
  const label = phase === 'ip' ? '⚽ 공 소유 시' : '🛡 공 미소유 시';
  document.getElementById('syncResult').innerHTML =
    `<div class="base-synced">✅ ${label} → <strong>${baseFormationName}</strong> 적용!</div>`;
  showToast(`${baseFormationName} ${label} 적용! ✅`);
}

function refreshSetupButtons(phase) {
  const g = document.getElementById('presetGrid' + (phase==='ip'?'IP':'OOP'));
  if (!g) return;
  g.querySelectorAll('.pbtn').forEach(b => b.classList.toggle('on', b.textContent === state[phase].formation));
}

}

function switchPhase(phase) {
  currentPhase = phase;
  document.getElementById('fptab-ip').classList.toggle('on',  phase==='ip');
  document.getElementById('fptab-oop').classList.toggle('on', phase==='oop');
  document.getElementById('phase-ip').classList.toggle('on',  phase==='ip');
  document.getElementById('phase-oop').classList.toggle('on', phase==='oop');
}

/* ═══════════════════════════════════════════════════
   PITCH RENDER
   ─────────────────────────────────────────────────
   state[phase].slots[i] = slotId
   state.players[i]      = 선수 데이터
   → i번 선수를 slotId 위치에 그린다.
   이름은 players[i].name 공유 (IP/OOP 무관)
═══════════════════════════════════════════════════ */
function renderPitch(phase) {
  const suffix = phase === 'ip' ? 'IP' : 'OOP';
  const SL = document.getElementById('slotsLayer' + suffix);
  const TL = document.getElementById('tokensLayer' + suffix);
  SL.innerHTML = ''; TL.innerHTML = '';
  const slots   = state[phase].slots;
  const roleKey = phase === 'ip' ? 'ipRole' : 'oopRole';

  slots.forEach((slotId, playerIdx) => {
    const def = ALL_SLOTS.find(d => d.id === slotId);
    if (!def) return;

    /* ── 슬롯 ── */
    const slot = document.createElement('div');
    slot.className = 'slot has-player';
    slot.style.left = def.x + '%';
    slot.style.top  = def.y + '%';
    slot.dataset.playerIdx = playerIdx;

    slot.addEventListener('dragover', e => {
      if (interactMode !== 'drag') return;
      e.preventDefault(); slot.classList.add('drag-over');
    });
    slot.addEventListener('dragleave', () => slot.classList.remove('drag-over'));
    slot.addEventListener('drop', e => {
      if (interactMode !== 'drag') return;
      e.preventDefault(); slot.classList.remove('drag-over');
      handleDrop(playerIdx, phase);
    });
    SL.appendChild(slot);

    /* ── 토큰 ── */
    const p = state.players[playerIdx];
    if (!p) return;
    const isGK  = slotId === 'GK';
    const isSel = selIdx[phase] === playerIdx;

    const tk = document.createElement('div');
    tk.className = 'token' + (isGK ? ' gk' : '') + (isSel ? ' selected' : '');
    tk.style.left = def.x + '%';
    tk.style.top  = def.y + '%';
    tk.dataset.playerIdx = playerIdx;
    tk.draggable = (interactMode === 'drag');

    const role = p[roleKey] || '';
    const roleShort = role.match(/\(([^)]+)\)/);

    tk.innerHTML = `
      <div class="token-circle">
        <div class="pos-abbr">${slotId}</div>
        <div class="role-badge ${phase==='ip'?'ip-color':'oop-color'}">${roleShort ? roleShort[1] : ''}</div>
      </div>
      <div class="token-name">${p.name}</div>
      <div class="token-role">${role}</div>
    `;

    tk.addEventListener('click', e => {
      if (interactMode === 'drag') return;
      e.stopPropagation();
      handleTokenClick(playerIdx, phase);
    });

    tk.addEventListener('dragstart', e => {
      if (interactMode !== 'drag') { e.preventDefault(); return; }
      dragPlayerIdx = playerIdx;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', String(playerIdx));
      setTimeout(() => tk.classList.add('dragging'), 0);
    });
    tk.addEventListener('dragend', () => {
      if (interactMode !== 'drag') return;
      document.querySelectorAll('.slot.drag-over').forEach(s => s.classList.remove('drag-over'));
      dragPlayerIdx = null;
      renderPitch(phase);
    });

    /* 모바일 터치 */
    let tActive = false;
    tk.addEventListener('touchstart', e => {
      if (interactMode === 'edit') return;
      tActive = true; dragPlayerIdx = playerIdx;
      tk.classList.add('dragging');
    }, { passive: true });

    tk.addEventListener('touchmove', e => {
      if (interactMode === 'edit' || !tActive) return;
      e.preventDefault();
      const t = e.touches[0];
      document.querySelectorAll('.slot').forEach(s => s.classList.remove('drag-over'));
      const nearest = findNearestSlot(t.clientX, t.clientY, 52);
      if (nearest) nearest.classList.add('drag-over');
    }, { passive: false });

    tk.addEventListener('touchend', e => {
      if (interactMode === 'edit') {
        e.preventDefault(); e.stopPropagation();
        handleTokenClick(playerIdx, phase);
        return;
      }
      if (!tActive) return;
      tActive = false;
      tk.classList.remove('dragging');
      document.querySelectorAll('.slot.drag-over').forEach(s => s.classList.remove('drag-over'));
      const t = e.changedTouches[0];
      const nearest = findNearestSlot(t.clientX, t.clientY, 56);
      if (nearest) handleDrop(Number(nearest.dataset.playerIdx), phase);
      dragPlayerIdx = null;
      renderPitch(phase);
    });

    TL.appendChild(tk);
  });
}

/* ═══════════════════════════════════════════════════
   TOKEN CLICK
═══════════════════════════════════════════════════ */
function handleTokenClick(playerIdx, phase) {
  if (selIdx[phase] === playerIdx) {
    selIdx[phase] = null;
    closeEditor(phase);
    renderPitch(phase);
  } else {
    selIdx[phase] = playerIdx;
    renderPitch(phase);
    openEditor(playerIdx, phase);
  }
}

/* ═══════════════════════════════════════════════════
   DROP HANDLER
   ─────────────────────────────────────────────────
   드래그: 해당 phase의 slots 배열에서 slotId만 교환.
   players 배열은 건드리지 않음.
   → 선수가 자리를 바꾸는 게 아니라,
     슬롯 위치가 바뀌는 것.
═══════════════════════════════════════════════════ */
function handleDrop(toPlayerIdx, phase) {
  if (dragPlayerIdx === null || dragPlayerIdx === toPlayerIdx) return;
  const slots = state[phase].slots;
  // 두 인덱스의 slotId 교환
  [slots[dragPlayerIdx], slots[toPlayerIdx]] = [slots[toPlayerIdx], slots[dragPlayerIdx]];

  if (selIdx[phase] === dragPlayerIdx) selIdx[phase] = toPlayerIdx;
  dragPlayerIdx = null;
  renderPitch(phase);
  if (selIdx[phase] !== null) openEditor(selIdx[phase], phase);
}

function findNearestSlot(cx, cy, maxDist) {
  let best = null, bd = Infinity;
  document.querySelectorAll('.slot').forEach(s => {
    const r = s.getBoundingClientRect();
    const d = Math.hypot(cx - (r.left + r.width/2), cy - (r.top + r.height/2));
    if (d < bd && d < maxDist) { bd = d; best = s; }
  });
  return best;
}

/* ═══════════════════════════════════════════════════
   PLAYER EDITOR
═══════════════════════════════════════════════════ */
function openEditor(playerIdx, phase) {
  const p = state.players[playerIdx];
  if (!p) return;
  const slotId    = state[phase].slots[playerIdx];
  const roleKey   = phase === 'ip' ? 'ipRole' : 'oopRole';
  const piKey     = phase === 'ip' ? 'ipPi'   : 'oopPi';
  const rolesList = STANDARD_ROLES[slotId] || ['기본'];
  const rd = ROLE_DATA.find(r => r.r === p[roleKey]) || { f:[], l:[] };

  const color = phase === 'ip' ? 'var(--acc2)' : 'var(--red)';
  let html = `<div style="font-family:'Barlow Condensed';font-size:14px;font-weight:700;color:${color};margin-bottom:8px;">
    #${playerIdx+1} ${slotId} 설정
  </div>`;

  // 이름: players[playerIdx].name 공유 (IP/OOP 양쪽에 즉시 반영)
  html += `<div class="ped-field" style="margin-bottom:10px;">
    <div class="ped-label">선수 이름 <span style="color:var(--acc);font-size:9px;">★ IP/OOP 공유</span></div>
    <input class="ped-input" type="text" value="${p.name}"
      oninput="upName(${playerIdx}, this.value)" placeholder="이름 입력">
  </div>`;

  // 역할: phase별 독립
  html += `<div class="ped-field" style="margin-bottom:10px;">
    <div class="ped-label">역할 (${phase === 'ip' ? '공 소유 시' : '공 미소유 시'})</div>
    <select class="ped-select" onchange="upRole(${playerIdx},'${phase}',this.value)">
      ${rolesList.map(r => `<option value="${r}" ${r===p[roleKey]?'selected':''}>${r}</option>`).join('')}
    </select>
  </div>`;

  // 개인 지침: phase별 독립
  for (const [cat, opts] of Object.entries(PI_CATS)) {
    html += `<div class="pi-sec"><div class="pi-sec-label">${cat}</div><div class="pi-chips">`;
    opts.forEach(o => {
      const isF = rd.f.includes(o), isL = rd.l.includes(o), isOn = p[piKey][o];
      let cls = 'pichip';
      if (isF) cls += ' forced'; else if (isL) cls += ' locked'; else if (isOn) cls += ' on';
      html += `<button class="${cls}" ${(isF||isL)?'disabled':''}
        onclick="togglePI(${playerIdx},'${phase}','${o}',this)">${o}</button>`;
    });
    html += `</div></div>`;
  }

  const suffix = phase === 'ip' ? 'IP' : 'OOP';
  document.getElementById('pedContent' + suffix).innerHTML = html;
  document.getElementById('playerEditor' + suffix).classList.add('open');
}

function closeEditor(phase) {
  document.getElementById('playerEditor' + (phase==='ip'?'IP':'OOP')).classList.remove('open');
}

/* ─── 이름 수정: players[i].name 하나만 바꿈 → 양 피치 즉시 반영 ─── */
function upName(playerIdx, val) {
  state.players[playerIdx].name = val;
  // IP 피치
  document.querySelectorAll('#tokensLayerIP .token').forEach(tk => {
    if (Number(tk.dataset.playerIdx) === playerIdx) {
      const el = tk.querySelector('.token-name');
      if (el) el.textContent = val;
    }
  });
  // OOP 피치
  document.querySelectorAll('#tokensLayerOOP .token').forEach(tk => {
    if (Number(tk.dataset.playerIdx) === playerIdx) {
      const el = tk.querySelector('.token-name');
      if (el) el.textContent = val;
    }
  });
}

function upRole(playerIdx, phase, val) {
  const roleKey = phase === 'ip' ? 'ipRole' : 'oopRole';
  state.players[playerIdx][roleKey] = val;
  renderPitch(phase);
  openEditor(playerIdx, phase);
}

function togglePI(playerIdx, phase, label, btn) {
  const piKey = phase === 'ip' ? 'ipPi' : 'oopPi';
  state.players[playerIdx][piKey][label] = !state.players[playerIdx][piKey][label];
  btn.classList.toggle('on', state.players[playerIdx][piKey][label]);
}

/* ═══════════════════════════════════════════════════
   SCREEN NAV
═══════════════════════════════════════════════════ */
function goScreen(id, btn) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  document.getElementById('s-' + id).classList.add('on');
  document.querySelectorAll('.ntab').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
}

/* ═══════════════════════════════════════════════════
   SAVE / LOAD / EXPORT
═══════════════════════════════════════════════════ */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function doSave() {
  const tName = document.getElementById('tacticName').value.trim() || '나의 전술';
  const saves = JSON.parse(localStorage.getItem('fm26_saves') || '{}');
  saves[tName] = JSON.parse(JSON.stringify(state));
  localStorage.setItem('fm26_saves', JSON.stringify(saves));
  showToast(`'${tName}' 저장 완료! 💾`);
  renderSaves();
}

function doExportJSON() {
  const tName = document.getElementById('tacticName').value.trim() || 'tactic';
  const a = document.createElement('a');
  a.setAttribute('href', 'data:text/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(state, null, 2)));
  a.setAttribute('download', `FM26_${tName}.json`);
  document.body.appendChild(a); a.click(); a.remove();
  showToast('JSON 다운로드! ⬇️');
}

function renderSaves() {
  const saves = JSON.parse(localStorage.getItem('fm26_saves') || '{}');
  const list  = document.getElementById('saveList');
  if (!list) return;
  if (!Object.keys(saves).length) {
    list.innerHTML = '<div class="empty-msg">저장된 전술이 없습니다.</div>';
    return;
  }
  list.innerHTML = '';
  for (const [name, data] of Object.entries(saves)) {
    const item = document.createElement('div');
    item.className = 'save-item';
    item.innerHTML = `
      <div class="si-info">
        <div class="si-name">${name}</div>
        <div class="si-meta">IP: ${data.ip.formation} / OOP: ${data.oop.formation} / ${data.mentality}</div>
      </div>
      <button class="ibtn" onclick="loadSave('${name}')">불러오기</button>
      <button class="ibtn" style="border-color:var(--red);color:var(--red);" onclick="deleteSave('${name}')">삭제</button>
    `;
    list.appendChild(item);
  }
}

function loadSave(name) {
  const saves = JSON.parse(localStorage.getItem('fm26_saves') || '{}');
  if (!saves[name]) return;
  state = saves[name];
  document.getElementById('tacticName').value = name;
  buildMentality();
  renderPitch('ip');
  renderPitch('oop');
  showToast(`'${name}' 불러오기! ✅`);
  goScreen('formation', document.querySelectorAll('.ntab')[2]);
}

function deleteSave(name) {
  if (!confirm(`'${name}' 전술을 삭제하시겠습니까?`)) return;
  const saves = JSON.parse(localStorage.getItem('fm26_saves') || '{}');
  delete saves[name];
  localStorage.setItem('fm26_saves', JSON.stringify(saves));
  showToast(`'${name}' 삭제됨 🗑️`);
  renderSaves();
}
</script>
